            top: 20px;
            bottom: 20px;
            left: -5px;
            width: 3px;
            background: #92400e;
            border-radius: 2px;

        '의료진단기술', '영상진단기술', '유전자검사', '혈액검사', '소변검사', '심전도검사', '뇌파검사', '초음파검사', '엑스레이촬영', '컴퓨터단층촬영',

        '지속가능성', '친환경', '에너지절약', '탄소중립', '기후변화', '생태계보호', '자원순환', '녹색성장', '신재생에너지', '환경보호'

    const kor_level4Words = [
        '디지털트랜스포메이션', '인더스트리포점영', '스마트팩토리시스템', '사물인터넷플랫폼', '빅데이터분석플랫폼', '인공지능머신러닝', '딥러닝알고리즘', '자연어처리기술',
        '로봇프로세스자동화', '클라우드컴퓨팅서비스', '엣지컴퓨팅기술', '양자컴퓨팅기술', '블록체인기술활용', '암호화폐거래시스템', '디지털자산관리', '핀테크서비스개발',
        '자율주행차기술', '전기자동차배터리', '수소연료전지차', '커넥티드카기술', '차량공유서비스', '모빌리티서비스', '스마트교통시스템', '지능형교통시스템',
        '스마트시티구축', '디지털트윈기술', '사이버보안시스템', '네트워크보안솔루션', '정보보호관리체계', '개인정보보호법', '데이터프라이버시', '클라우드보안기술',
        '바이오테크놀로지', '유전자가위기술', '줄기세포치료제', '면역항암제개발', '정밀의료서비스', '디지털헬스케어', '원격의료시스템', '웨어러블헬스기기'
    ];

    // English Words
    const eng_beginnerWords = [
        'cat', 'dog', 'car', 'run', 'big', 'fun', 'sun', 'hat', 'bat', 'bag',
        'cup', 'pen', 'box', 'toy', 'map', 'egg', 'red', 'blue', 'tree', 'book',
        'fish', 'bird', 'cake', 'ball', 'duck', 'frog', 'moon', 'star', 'door', 'hand',
        'foot', 'head', 'nose', 'eye', 'ear', 'milk', 'gold', 'fire', 'wind', 'rain',
        'love', 'baby', 'home', 'park', 'food', 'play', 'game', 'time', 'work', 'good'
    ];
    const eng_easyWords = [
        'house', 'water', 'friend', 'school', 'happy', 'music', 'paper', 'phone', 'table', 'chair',
        'green', 'white', 'black', 'money', 'light', 'sound', 'world', 'think', 'learn', 'write',
        'clean', 'beach', 'ocean', 'smile', 'heart', 'brain', 'sweet', 'fresh', 'quick', 'smart',
        'bread', 'apple', 'grape', 'lemon', 'onion', 'pizza', 'party', 'dance', 'dream', 'sleep',
        'river', 'cloud', 'storm', 'night', 'space', 'earth', 'power', 'peace', 'story', 'watch'
    ];
    const eng_mediumWords = [
        'beautiful', 'important', 'computer', 'keyboard', 'language', 'surprise', 'together', 'mountain',
        'remember', 'breakfast', 'birthday', 'question', 'children', 'vacation', 'elephant', 'sandwich',
        'hospital', 'business', 'problem', 'picture', 'service', 'parking', 'weather', 'library',
        'calendar', 'internet', 'software', 'hardware', 'security', 'database', 'platform', 'solution',
        'creative', 'positive', 'negative', 'absolute', 'relative', 'physical', 'chemical', 'natural'
    ];
    const eng_hardWords = [
        'education', 'technology', 'psychology', 'philosophy', 'restaurant', 'government', 'environment',
        'opportunity', 'organization', 'relationship', 'championship', 'photography', 'university',
        'development', 'responsibility', 'communication', 'construction', 'information', 'international',
        'application', 'integration', 'performance', 'requirement', 'measurement', 'improvement', 'maintenance',
        'significant', 'appropriate', 'independent', 'traditional', 'professional', 'intellectual', 'contemporary'
    ];
    const eng_expertWords = [
        'extraordinary', 'pronunciation', 'massachusetts', 'incomprehensible', 'responsibilities',
        'characteristics', 'acknowledgment', 'embarrassment', 'pharmaceutical', 'entrepreneurship',
        'architecture', 'archaeological', 'chronological', 'electromagnetic', 'meteorological',
        'cardiovascular', 'gastrointestinal', 'ophthalmologist', 'neuropsychology', 'biotechnology',
        'nanotechnology', 'cryptocurrency', 'biochemistry', 'astrophysics', 'thermodynamics',
        'photosynthesis', 'metamorphosis', 'anthropomorphic', 'differentiation', 'implementation'
    ];

    let gameState = {
        isPlaying: false,
        level: 1,
        maxLevel: 10,
        packages: [],
        packageId: 0,
        spawnInterval: null,
        gameSpeed: 8000,
        isGameCompleted: false,
        processedPackages: 0,
        timer: 60,
        gameTimer: null,
        globalUsedWords: []
    };

    // --- Core Functions ---

    function setGameMode(mode) {
        currentMode = mode;

        // Toggle Button UI
        document.getElementById('btn-korean').classList.toggle('active', mode === 'Korean');
        document.getElementById('btn-english').classList.toggle('active', mode === 'English');

        // Update Text UI
        updateUI();

        // Reset Game Logic completely to prevent mixed languages
        resetGame();
    }

    function updateUI() {
        const t = uiText[currentMode];
        document.getElementById('ui-title').textContent = t.title;
        document.getElementById('ui-desc').textContent = t.desc;
        document.getElementById('ui-stat-time').textContent = t.statTime;
        document.getElementById('ui-stat-missed').textContent = t.statMissed;
        document.getElementById('ui-stat-level').textContent = t.statLevel;
        document.getElementById('wordInput').placeholder = t.placeholder;
        document.getElementById('submitBtn').textContent = t.btnSubmit;
        document.getElementById('btn-start').textContent = t.btnStart;
        document.getElementById('btn-reset').textContent = t.btnReset;
        document.documentElement.lang = currentMode === 'Korean' ? 'ko' : 'en';
    }

    function getRandomWord() {
        let availableWords;

        if (currentMode === 'Korean') {
            if (gameState.level <= 2) availableWords = kor_level1Words;
            else if (gameState.level <= 5) availableWords = kor_level2Words;
            else if (gameState.level <= 8) availableWords = kor_level3Words;
            else availableWords = kor_level4Words;
        } else { // English
            if (gameState.level <= 2) availableWords = eng_beginnerWords;
            else if (gameState.level <= 4) availableWords = eng_easyWords;
            else if (gameState.level <= 6) availableWords = eng_mediumWords;
            else if (gameState.level <= 8) availableWords = eng_hardWords;
            else availableWords = eng_expertWords;
        }

        const unusedWords = availableWords.filter(word => !gameState.globalUsedWords.includes(word));

        if (unusedWords.length === 0) {
            // Remove current level words from global used list to recycle them
            gameState.globalUsedWords = gameState.globalUsedWords.filter(word => !availableWords.includes(word));
            return availableWords[Math.floor(Math.random() * availableWords.length)];
        }

        const selectedWord = unusedWords[Math.floor(Math.random() * unusedWords.length)];
        gameState.globalUsedWords.push(selectedWord);
        return selectedWord;
    }

    function createPackage() {
        const word = getRandomWord();
        const package = {
            id: gameState.packageId++,
            word: word,
            element: null
        };

        const packageElement = document.createElement('div');
        packageElement.className = 'package';
        packageElement.textContent = word;
        packageElement.style.animationDuration = `${gameState.gameSpeed}ms`;
        packageElement.id = `package-${package.id}`;

        // Adjust font size for English words if they are long
        if (currentMode === 'English') {
            if (word.length > 15) packageElement.style.fontSize = '12px';
            else if (word.length > 10) packageElement.style.fontSize = '14px';
        }

        document.getElementById('conveyor').appendChild(packageElement);
        package.element = packageElement;
        gameState.packages.push(package);
        updateQueue();

        setTimeout(() => {
            if (package.element && package.element.parentNode && gameState.isPlaying) {
                removePackage(package.id);
                gameState.processedPackages++;
                updateQueue();

                if (gameState.processedPackages >= 3) {
                    gameOver();
                }
            }
        }, gameState.gameSpeed);
    }

    function removePackage(packageId) {
        const packageIndex = gameState.packages.findIndex(p => p.id === packageId);
        if (packageIndex !== -1) {
            const package = gameState.packages[packageIndex];
            if (package.element && package.element.parentNode) {
                package.element.parentNode.removeChild(package.element);
            }
            gameState.packages.splice(packageIndex, 1);
            updateQueue();
        }
    }

    function updateQueue() {
        document.getElementById('missed').textContent = gameState.processedPackages;
        const queueElement = document.getElementById('missed').parentElement;
        if (gameState.processedPackages >= 2) {
            queueElement.classList.add('queue-warning');
        } else {
            queueElement.classList.remove('queue-warning');
        }
    }

    function updateTimer() {
        document.getElementById('timer').textContent = gameState.timer;
        const timerElement = document.getElementById('timer-container');
        if (gameState.timer <= 10) {
            timerElement.classList.add('timer-warning');
        } else {
            timerElement.classList.remove('timer-warning');
        }
    }

    function startLevelTimer() {
        gameState.timer = 60;
        updateTimer();
        gameState.gameTimer = setInterval(() => {
            gameState.timer--;
            updateTimer();
            if (gameState.timer <= 0) {
                levelCompleted();
            }
        }, 1000);
    }

    function checkWord() {
        if (!gameState.isPlaying) return;

        const input = document.getElementById('wordInput');
        const inputWord = input.value.trim();

        if (inputWord === '') return;

        const targetPackage = gameState.packages[0];
        if (targetPackage && targetPackage.word === inputWord) {
            targetPackage.element.classList.add('package-falling');
            setTimeout(() => {
                removePackage(targetPackage.id);
            }, 1000);
        }

        input.value = '';
    }

    function levelCompleted() {
        if (gameState.level >= gameState.maxLevel) {
            gameCompleted();
            return;
        }

        stopGameLogic();
        document.getElementById('wordInput').disabled = true;

        const modal = document.getElementById('gameOverModal');
        const title = modal.querySelector('.modal-title');
        const scoreText = modal.querySelector('.modal-score');
        const buttonsContainer = modal.querySelector('.modal-buttons');
        const t = uiText[currentMode];

        title.textContent = t.modalTitleClear; // "Level Complete" or "완벽해요"
        title.style.color = '#10b981';
        scoreText.innerHTML = `${gameState.level} ${t.msgLevelClear}<br>60s Cleared!`;

        buttonsContainer.innerHTML = `
                <button class="modal-btn restart-btn" onclick="nextLevel()">${t.btnNext}</button>
                <button class="modal-btn exit-btn" onclick="exitGame()">${t.btnExit}</button>
            `;

        modal.style.display = 'flex';
    }

    function nextLevel() {
        gameState.level++;
        document.getElementById('level').textContent = gameState.level;
        gameState.gameSpeed = Math.max(4000, gameState.gameSpeed - 400);
        gameState.globalUsedWords = []; // Reset used words for new level if desired, or keep to force unique words

        // Clear current packages
        gameState.packages.forEach(package => {
            if (package.element && package.element.parentNode) {
                package.element.parentNode.removeChild(package.element);
            }
        });
        gameState.packages = [];
        gameState.processedPackages = 0;
        updateQueue();

        document.getElementById('gameOverModal').style.display = 'none';

        gameState.isPlaying = true;
        document.getElementById('wordInput').disabled = false;
        document.getElementById('wordInput').focus();

        startLevelTimer();
        createPackage();
        gameState.spawnInterval = setInterval(createPackage, Math.max(1500, 3500 - gameState.level * 200));
    }

    function gameCompleted() {
        stopGameLogic();
        document.getElementById('wordInput').disabled = true;

        const modal = document.getElementById('gameOverModal');
        const title = modal.querySelector('.modal-title');
        const scoreText = modal.querySelector('.modal-score');
        const buttonsContainer = modal.querySelector('.modal-buttons');
        const t = uiText[currentMode];

        title.textContent = "🎉 ALL COMPLETE!";
        title.style.color = '#10b981';
        scoreText.innerHTML = t.modalScoreClear;

        buttonsContainer.innerHTML = `
                <button class="modal-btn restart-btn" onclick="restartFromLevel1()">${t.btnRetry}</button>
                <button class="modal-btn exit-btn" onclick="exitGame()">${t.btnExit}</button>
            `;

        modal.style.display = 'flex';
    }

    function restartFromLevel1() {
        resetGame();
        document.getElementById('gameOverModal').style.display = 'none';
    }

    function gameOver() {
        stopGameLogic();
        document.getElementById('wordInput').disabled = true;

        const modal = document.getElementById('gameOverModal');
        const title = modal.querySelector('.modal-title');
        const scoreText = modal.querySelector('.modal-score');
        const buttonsContainer = modal.querySelector('.modal-buttons');
        const t = uiText[currentMode];

        title.textContent = t.modalTitleOver;
        title.style.color = '#ef4444';
        scoreText.innerHTML = `${t.modalScoreOver} ${gameState.level}<br>3 ${t.msgMissedSuffix}`;

        buttonsContainer.innerHTML = `
                <button class="modal-btn restart-btn" onclick="restartFromLevel1()">${t.btnRetry}</button>
                <button class="modal-btn exit-btn" onclick="exitGame()">${t.btnExit}</button>
            `;

        modal.style.display = 'flex';
    }

    function stopGameLogic() {
        gameState.isPlaying = false;
        if (gameState.spawnInterval) {
            clearInterval(gameState.spawnInterval);
            gameState.spawnInterval = null;
        }
        if (gameState.gameTimer) {
            clearInterval(gameState.gameTimer);
            gameState.gameTimer = null;
        }
    }

    function startGame() {
        if (gameState.isPlaying) return;

        gameState.isPlaying = true;
        document.getElementById('wordInput').disabled = false;
        document.getElementById('wordInput').focus();

        startLevelTimer();
        createPackage();
        gameState.spawnInterval = setInterval(createPackage, 3500 - gameState.level * 200);
    }

    function resetGame() {
        stopGameLogic();

        gameState.level = 1;
        gameState.packages = [];
        gameState.packageId = 0;
        gameState.gameSpeed = 8000;
        gameState.isGameCompleted = false;
        gameState.processedPackages = 0;
        gameState.timer = 60;
        gameState.globalUsedWords = [];

        document.getElementById('timer').textContent = '60';
        document.getElementById('missed').textContent = '0';
        document.getElementById('level').textContent = '1';
        document.getElementById('wordInput').value = '';
        document.getElementById('wordInput').disabled = true;
        document.getElementById('conveyor').innerHTML = '';

        document.getElementById('missed').parentElement.classList.remove('queue-warning');
        document.getElementById('timer-container').classList.remove('timer-warning');
    }

    function closeModal() {
        document.getElementById('gameOverModal').style.display = 'none';
    }

    function exitGame() {
        closeModal();
        resetGame();
        window.location.href = '../index.html';
    }

    // --- Event Listeners ---

    // Keypress for input
    document.getElementById('wordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkWord();
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space' && gameState.isPlaying) {
            e.preventDefault();
            checkWord();
        }
    });

    // Navigation scroll effect
    window.addEventListener('scroll', () => {
        const nav = document.querySelector('nav');
        if (window.scrollY > 100) {
            nav.style.background = 'rgba(255, 255, 255, 0.98)';
        } else {
            nav.style.background = 'rgba(255, 255, 255, 0.95)';
        }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        resetGame();
    });
</script>
