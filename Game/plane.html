        .dropdown-menu a:hover { background: #f8f9fa; color: #667eea; padding-left: 1.2rem; }

        /* --- Game Container --- */
        #gameContainer { position: relative; width: 100vw; height: calc(100vh - 80px); overflow: hidden; }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* --- Plane (CSS Art) --- */

        #plane .tail { position: absolute; top: -15px; left: 5px; width: 25px; height: 30px; background: linear-gradient(to right, #78909c, #455a64); transform: skewX(-20deg); border-radius: 5px 5px 0 0; z-index: 1; }
        #plane .wing-main { position: absolute; top: 18px; left: 30px; width: 50px; height: 15px; background: linear-gradient(to bottom, #b0bec5, #546e7a); transform: skewX(-30deg); border-radius: 0 0 50% 10%; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); z-index: 4; }

        #plane .engine-fire { position: absolute; top: 12px; left: -20px; width: 30px; height: 16px; background: linear-gradient(to left, rgba(255, 255, 0, 0), rgba(255, 100, 0, 0.8), rgba(255, 0, 0, 0.5)); border-radius: 50%; filter: blur(2px); animation: flicker 0.1s infinite alternate; z-index: 0; }

        #userInput.valid { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }

        /* --- Modal Screens --- */
        .modal-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }

    class FlightGame {
        constructor() {
            // DOM Elements
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.plane = document.getElementById('plane');
            this.wordDisplay = document.getElementById('wordDisplay');

            this.language = 'KO';
            this.level = 1;
            this.timer = 60;
            this.gameRunning = false;
            this.isComposing = false;

            // Physics & Logic
            this.planeY = 0;

            this.fallSpeed = 40; // Reduced from 200 (0.2x)

            this.levelStartTime = 0;
            this.lastObstacleTime = 0;

            // Arrays

            this.particles = [];
            this.usedWords = [];
            this.obstaclePatterns = ['top', 'both', 'bottom', 'both'];

            this.lastSubmitTime = 0;
            this.inputBlockUntil = 0;

            // Bind Methods
            this.loop = this.loop.bind(this);

            // Init
            this.init();
            this.setupEvents();

            // Start Loop
            requestAnimationFrame(this.loop);
        }

        init() {
            this.resize();
            this.createClouds();
            this.setLanguageUI();
            this.planeY = this.canvas.height / 2;
            this.targetY = this.planeY;
            this.plane.style.top = `${this.planeY}px`;
        }

        resize() {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight - 80; // Minus navbar
        }

        setupEvents() {
            window.addEventListener('resize', () => this.resize());
            this.heroStartBtn.onclick = () => this.startGame();
            this.restartBtn.onclick = () => this.restart();
            this.nextStageBtn.onclick = () => this.nextStage();
            this.exitBtn.onclick = () => window.location.href = '../index.html';
            this.langSwitchBtn.onclick = () => this.toggleLanguage();

            // Input Handling
            this.userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    this.handleEnter();
                }
            });

            this.userInput.addEventListener('input', (e) => this.handleInput(e));

            this.userInput.addEventListener('compositionstart', () => this.isComposing = true);
            this.userInput.addEventListener('compositionend', () => this.isComposing = false);

            // Focus maintenance
            document.addEventListener('click', (e) => {
                if (this.gameRunning && !e.target.closest('button')) {
                    this.userInput.focus();
                }
            });
        }

        toggleLanguage() {
            this.language = this.language === 'KO' ? 'EN' : 'KO';
            this.setLanguageUI();
            if (this.state === 'PLAYING') {
                this.restart();
            }
        }

        setLanguageUI() {
            const isKo = this.language === 'KO';
            this.langSwitchBtn.textContent = isKo ? 'Language: Korean' : 'Language: English';
            this.userInput.placeholder = isKo ? '단어를 입력하세요' : 'Type the word';
            this.heroStartBtn.textContent = isKo ? '비행 시작' : 'Start Flight';
            document.getElementById('instruction').textContent = isKo ? '타이핑으로 비행기를 조종하세요!' : 'Type to control the plane!';
        }

        startGame() {
            this.state = 'PLAYING';
            this.gameRunning = true;
            this.isExploding = false;
            this.level = 1;
            this.timer = 60;
            this.levelStartTime = Date.now();
            this.lastFrameTime = Date.now();

            // Reset Plane
            this.planeY = this.canvas.height / 2;
            this.targetY = this.planeY;
            this.plane.style.display = 'block';
            this.plane.style.top = `${this.planeY}px`;
            this.plane.style.transform = 'translateY(-50%) rotate(0deg)';

            // Reset Arrays
            this.obstacles = [];
            this.particles = [];
            this.usedWords = [];
            this.passageHistory = [];

            // UI
            this.startScreen.style.display = 'none';
            this.gameOverScreen.style.display = 'none';
            this.wordDisplay.style.display = 'block';

            // Input Clear
            this.userInput.value = '';
            this.isBlockingInput = false;
            this.userInput.focus();

            // Force first obstacle immediately
            this.lastObstacleTime = 0;
            this.spawnObstacle(true);

            this.generateWords();
            this.updateUI();
        }

        nextStage() {
            this.level++;
            this.gameOverScreen.style.display = 'none';
            this.wordDisplay.style.display = 'block';

            this.gameRunning = true;
            this.levelStartTime = Date.now();
            this.obstacles = [];
            this.planeY = this.canvas.height / 2;
            this.targetY = this.planeY;
            this.plane.style.display = 'block';

            this.userInput.value = '';
            this.userInput.focus();
            this.generateWords();
            this.updateUI();
        }

        generateWords() {
            const wordsObj = this.language === 'KO' ? WORD_DATA.KO : WORD_DATA.EN;
            let list;
            if (this.level <= 3) list = wordsObj.level1_3;
            else if (this.level <= 6) list = wordsObj.level4_6;
            else list = wordsObj.level7_10;

            // Avoid used words
            let available = list.filter(w => !this.usedWords.includes(w));
            if (available.length < 2) {
                this.usedWords = [];
                available = [...list];
            }

            const pick = () => {
                const idx = Math.floor(Math.random() * available.length);
                const word = available[idx];
                available.splice(idx, 1);
                return word;
            };

            this.currentWordUp = pick();
            this.currentWordDown = pick();

            this.usedWords.push(this.currentWordUp, this.currentWordDown);

            const prefix = this.language === 'KO' ? ['↑', '↓'] : ['↑', '↓'];
            this.currentWordUpEl.textContent = `${prefix[0]} ${this.currentWordUp}`;
            this.currentWordDownEl.textContent = `${prefix[1]} ${this.currentWordDown}`;
        }

        handleInput(e) {
            if (!this.gameRunning) return;

            if (Date.now() < this.inputBlockUntil) {
                this.userInput.value = '';
                return;
            }

            if (this.isComposing) return;

            const val = this.userInput.value.trim();
            // Smart Ghost Filter
            if (this.language === 'KO' && this.lastSubmittedChar && (Date.now() - this.lastSubmitTime < 500)) {
                if (val.startsWith(this.lastSubmittedChar)) {
                    let newVal = val === this.lastSubmittedChar ? '' : val.substring(1);
                    this.userInput.value = newVal;
                    return;
                }
            }

            const upMatch = this.currentWordUp.toLowerCase().startsWith(val.toLowerCase());
            const downMatch = this.currentWordDown.toLowerCase().startsWith(val.toLowerCase());

            if (val && (upMatch || downMatch)) {
                this.userInput.classList.add('valid');
                this.userInput.style.borderColor = '#22c55e';
            } else {
                this.userInput.classList.remove('valid');
                this.userInput.style.borderColor = '#ef4444';
            }
        }

        handleEnter() {
            if (!this.gameRunning) return;

            const val = this.userInput.value.trim();
            let success = false;
            let up = false;

            if (val.toLowerCase() === this.currentWordUp.toLowerCase()) {
                success = true; up = true;
            } else if (val.toLowerCase() === this.currentWordDown.toLowerCase()) {
                success = true; up = false;
            }

            if (success) {
                this.movePlane(up);
                this.generateWords();

                // --- GHOST BUSTER ---
                if (val.length > 0) this.lastSubmittedChar = val.slice(-1);
                this.lastSubmitTime = Date.now();

                this.inputBlockUntil = Date.now() + 50;

                this.userInput.value = '';

                if (this.language === 'KO') {
                    this.userInput.blur();
                    setTimeout(() => this.userInput.focus(), 10);
                } else {
                    this.userInput.focus();
                }
            } else {
                this.userInput.style.animation = 'shake 0.3s';
                setTimeout(() => this.userInput.style.animation = '', 300);
                this.userInput.value = '';
            }
        }

        movePlane(up) {
            const amount = 120;
            this.targetY = up ? this.targetY - amount : this.targetY + amount;
            this.targetY = Math.max(25, Math.min(this.canvas.height - 25, this.targetY));
        }

        getSpeed() {
            let baseSpeed = 150;
            if (this.level <= 3) baseSpeed = 150;
            else if (this.level <= 7) baseSpeed = 220;
            else baseSpeed = 300;
            if (this.language === 'EN') baseSpeed *= 0.6;
            return baseSpeed;
        }

        spawnObstacle(force = false) {
            const interval = Math.max(1500, 3000 - (this.level * 200));

            if (force || Date.now() - this.lastObstacleTime > interval) {
                const width = 80;
                const pattern = this.obstaclePatterns[this.patternIdx];
                this.patternIdx = (this.patternIdx + 1) % this.obstaclePatterns.length;

                const screenH = this.canvas.height;
                const gap = 350 - (this.level * 10);
                let gapCenter = screenH / 2;

                if (this.passageHistory.length > 0) {
                    const last = this.passageHistory[this.passageHistory.length-1];
                    gapCenter = Math.max(100 + gap/2, Math.min(screenH - 100 - gap/2, last.gapCenter + (Math.random()-0.5)*300));
                }

                this.createObstacles(pattern, width, gapCenter, gap);
                this.passageHistory.push({ gapCenter, gap });
                if(this.passageHistory.length > 3) this.passageHistory.shift();

                this.lastObstacleTime = Date.now();
            }
        }

        createObstacles(pattern, w, center, gap) {
            const topH = center - gap / 2;
            const botY = center + gap / 2;
            const botH = this.canvas.height - botY;

            if (pattern === 'both' || pattern === 'top') {
                if (topH > 20) this.obstacles.push({ x: this.canvas.width, y: 0, w, h: topH });
            }
            if (pattern === 'both' || pattern === 'bottom') {
                if (botH > 20) this.obstacles.push({ x: this.canvas.width, y: botY, w, h: botH });
            }
        }

        checkCollision(obs) {
            const px = 100 + 10;
            const py = this.planeY + 10;
            const pw = 80;
            const ph = 20;
            return px < obs.x + obs.w && px + pw > obs.x &&
                py < obs.y + obs.h && py + ph > obs.y;
        }

        triggerExplosion() {
            this.isExploding = true;
            this.gameRunning = false;
            this.plane.style.display = 'none';

            for(let i=0; i<40; i++) {
                this.particles.push({
                    x: 100 + 35, y: this.planeY,
                    vx: (Math.random()-0.5) * 200 * (Math.random() + 0.5),
                    vy: (Math.random()-0.5) * 200 * (Math.random() + 0.5),
                    life: 1.0,
                    color: `hsl(${Math.random()*60}, 100%, 50%)`,
                    size: Math.random() * 20 + 5
                });
            }

            document.body.style.animation = 'shake 0.5s';
            setTimeout(() => {
                document.body.style.animation = '';
                this.gameOver(false);
            }, 1000);
        }

        gameOver(success) {
            this.gameRunning = false;
            this.wordDisplay.style.display = 'none';
            this.gameOverScreen.style.display = 'flex';

            if (success) {
                this.gameOverTitle.textContent = this.language === 'KO' ? '🎉 성공! 다음 단계로! 🎉' : '🎉 COMPLETE! 🎉';
                this.gameOverTitle.style.color = '#4CAF50';
                this.restartBtn.style.display = 'none';
                this.nextStageBtn.style.display = 'inline-block';
            } else {
                this.gameOverTitle.textContent = this.language === 'KO' ? '게임 오버' : 'GAME OVER';
                this.gameOverTitle.style.color = '#EF4444';
                this.restartBtn.style.display = 'inline-block';
                this.nextStageBtn.style.display = 'none';
            }
        }

        restart() {
            this.gameOverScreen.style.display = 'none';
            this.startGame();
        }

        updateUI() {
            const label = this.language === 'KO' ? '시간' : 'Time';
            const lvl = this.language === 'KO' ? '레벨' : 'Level';
            this.timerEl.textContent = `${label}: ${Math.ceil(this.timer)}`;
            this.levelEl.textContent = `${lvl}: ${this.level}`;
        }

        drawBackground() {
            const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
            gradient.addColorStop(0, 'rgba(74, 144, 226, 0.3)');
            gradient.addColorStop(1, 'rgba(135, 206, 235, 0.2)');
            this.ctx.fillStyle = gradient;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            this.ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            this.clouds.forEach(c => {
                this.ctx.beginPath();
                this.ctx.arc(c.x, c.y, c.size, 0, Math.PI*2);
                this.ctx.fill();
            });
        }

        draw() {
            this.drawBackground();

            this.obstacles.forEach(o => {
                const grad = this.ctx.createLinearGradient(o.x, 0, o.x + o.w, 0);
                grad.addColorStop(0, '#374151');
                grad.addColorStop(0.5, '#4b5563');
                grad.addColorStop(1, '#374151');
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(o.x, o.y, o.w, o.h);

                this.ctx.save();
                this.ctx.beginPath();
                this.ctx.rect(o.x, o.y, o.w, o.h);
                this.ctx.clip();
                this.ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                this.ctx.lineWidth = 10;
                for(let i = -o.h; i < o.w + o.h; i+=20) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(o.x + i, o.y);
                    this.ctx.lineTo(o.x + i - 20, o.y + o.h + 100);
                    this.ctx.stroke();
                }
                this.ctx.restore();

                this.ctx.strokeStyle = '#ef4444';
                this.ctx.lineWidth = 2;
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = '#ef4444';
                this.ctx.strokeRect(o.x, o.y, o.w, o.h);
                this.ctx.shadowBlur = 0;
            });

            this.particles.forEach(p => {
                this.ctx.globalAlpha = p.life;
                this.ctx.fillStyle = p.color;
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.globalAlpha = 1.0;
            });
        }

        loop(timestamp) {
            if (!this.lastTime) this.lastTime = timestamp;
            const dt = (timestamp - this.lastTime) / 1000;
            this.lastTime = timestamp;

            if (this.gameRunning) {
                this.update(dt);
                this.spawnObstacle();

                const elapsed = (Date.now() - this.levelStartTime) / 1000;
                this.timer = Math.max(0, 60 - elapsed);
                this.updateUI();

                if (this.timer <= 0) this.gameOver(true);
            } else if (this.isExploding) {
                this.updateParticles(dt);
            } else {
                // Just draw background in menu
                this.drawBackground();
            }

            if (this.gameRunning || this.isExploding || this.state === 'MENU') {
                this.draw();
            }

            requestAnimationFrame(this.loop);
        }

        update(dt) {
            const currentSpeed = this.getSpeed();

            for (let i = this.obstacles.length - 1; i >= 0; i--) {
                let obs = this.obstacles[i];
                obs.x -= currentSpeed * dt;
                if (this.checkCollision(obs)) {
                    this.triggerExplosion();
                }
                if (obs.x + obs.w < 0) this.obstacles.splice(i, 1);
            }

            this.clouds.forEach(c => {
                c.x -= (c.speed * 60) * dt;
                if(c.x + c.size < 0) { c.x = this.canvas.width + c.size; c.y = Math.random() * this.canvas.height; }
            });

            // Plane Physics (Gravity)
            this.targetY += (this.fallSpeed * 0.5) * dt;
            this.targetY = Math.max(25, Math.min(this.canvas.height - 25, this.targetY));

            const smoothFactor = 5;
            this.planeY += (this.targetY - this.planeY) * smoothFactor * dt;

            const velocity = (this.targetY - this.planeY);
            let tilt = velocity * 0.5;
            tilt = Math.max(-20, Math.min(20, tilt));

            this.plane.style.top = `${this.planeY}px`;
            this.plane.style.transform = `translateY(-50%) rotate(${tilt}deg)`;

            if (this.planeY <= 20 || this.planeY >= this.canvas.height - 20) {
                this.triggerExplosion();
                this.gameOver(false);
            }
        }

        updateParticles(dt) {
            for (let i = this.particles.length - 1; i >= 0; i--) {
                let p = this.particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= 1.0 * dt;
                if(p.life <= 0) this.particles.splice(i, 1);
            }
        }

        createClouds() {
            this.clouds = [];
            for (let i = 0; i < 5; i++) {
                this.clouds.push({
                    x: Math.random() * this.canvas.width,
                    y: Math.random() * this.canvas.height,
                    size: 40 + Math.random() * 50,
                    speed: 0.5 + Math.random() * 1.5
                });
            }
        }
    }

    window.addEventListener('load', () => {
        new FlightGame();
    });

    window.addEventListener('resize', () => {
        const canvas = document.getElementById('gameCanvas');
        if (canvas) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 80;
        }
    });
</script>
</body>
